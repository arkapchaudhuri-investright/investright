# Drop-in for the existing investright-refresh.service, which lives on the VM
# (not in this repo). Install with:
#
#   sudo mkdir -p /etc/systemd/system/investright-refresh.service.d
#   sudo cp systemd/refresh-onfailure.conf \
#           /etc/systemd/system/investright-refresh.service.d/onfailure.conf
#   sudo systemctl daemon-reload
#
# Without this, a failed nightly refresh is silent: the site keeps serving the
# last good snapshot and nobody finds out until the numbers look stale.
[Unit]
OnFailure=investright-alert@%n.service
